name: Release Linux x64

run-name: Release Linux x64 (${{ github.event.workflow_run.head_sha || github.sha }})

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: release-linux-x64
  cancel-in-progress: true

jobs:
  build:
    # Allow manual runs from Actions tab, and auto-publish only for successful CI runs from pushes to main.
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' && github.event.workflow_run.event == 'push') }}

    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - name: Checkout correct commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller==6.11.1

      - name: Log release context
        run: |
          echo "::group::Release Context"
          echo "Source workflow run: ${{ github.event.workflow_run.id }}"
          echo "Source SHA: ${{ github.event.workflow_run.head_sha }}"
          echo "Triggered by branch: ${{ github.event.workflow_run.head_branch }}"
          echo "Runner: $RUNNER_OS"
          echo "::endgroup::"

      - name: Build with PyInstaller
        run: |
          echo "::group::Build"
          pyinstaller \
            --distpath "artifacts/" \
            --workpath "artifacts/build" \
            --clean \
            --noconfirm \
            build-configs/FyShare.spec
          echo "::endgroup::"

      - name: Package build output
        run: |
          test -d ./artifacts/dist
          test -d ./artifacts/dist/static
          test -d ./artifacts/dist/templates
          test -f ./artifacts/dist/config.json
          test -f ./artifacts/dist/config_example.json
          test -f ./artifacts/dist/README.md
          test -f ./artifacts/dist/LICENSE
          cd artifacts/dist
          zip -r ../fyshare-linux-x64-shared.zip .
          cd ../..
          test -f ./artifacts/fyshare-linux-x64-shared.zip

      - name: Log packaged artifact details
        run: |
          echo "::group::Artifacts"
          ls -lah ./artifacts
          echo "::endgroup::"

      - name: Upload artifact snapshot
        uses: actions/upload-artifact@v4
        with:
          name: fyshare-linux-x64-shared
          path: artifacts/fyshare-linux-x64-shared.zip
          if-no-files-found: error
          compression-level: 0

      - name: Publish release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: artifacts/fyshare-linux-x64-shared.zip
          fail_on_unmatched_files: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}