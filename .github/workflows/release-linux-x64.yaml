name: Release Linux x64

run-name: Release Linux x64 (${{ github.event.workflow_run.head_sha }})

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: release-linux-x64
  cancel-in-progress: true

jobs:
  build:
    # Publish only for successful CI runs originating from pushes to main.
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' && github.event.workflow_run.event == 'push' }}

    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - name: Checkout correct commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller==6.11.1

      - name: Log release context
        run: |
          echo "::group::Release Context"
          echo "Source workflow run: ${{ github.event.workflow_run.id }}"
          echo "Source SHA: ${{ github.event.workflow_run.head_sha }}"
          echo "Triggered by branch: ${{ github.event.workflow_run.head_branch }}"
          echo "Runner: $RUNNER_OS"
          echo "::endgroup::"

      - name: Verify required build files
        run: |
          test -f FyShare.py
          test -f config.json
          test -f config_example.json
          test -d static
          test -d templates

      - name: Build with PyInstaller
        run: |
          echo "::group::Build"
          pyinstaller \
            --distpath ./bin \
            --workpath ./bin/build \
            --specpath ./bin \
            --add-data "static:static" \
            --add-data "templates:templates" \
            --add-data "config.json:." \
            --add-data "config_example.json:." \
            FyShare.py
          echo "::endgroup::"

      - name: Package build output
        run: |
          test -d ./bin/FyShare
          cd bin/FyShare
          zip -r ../fyshare-linux-64-shared.zip .
          cd ../..

      - name: Log packaged artifact details
        run: |
          echo "::group::Artifacts"
          ls -lah ./bin
          echo "::endgroup::"

      - name: Upload artifact snapshot
        uses: actions/upload-artifact@v4
        with:
          name: fyshare-linux-64-shared
          path: bin/fyshare-linux-x64-shared.zip
          if-no-files-found: error

      - name: Publish release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: bin/fyshare-linux-64-shared.zip
          fail_on_unmatched_files: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}