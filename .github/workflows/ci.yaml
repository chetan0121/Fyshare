name: CI

run-name: CI (${{ github.ref_name }} @ ${{ github.sha }})

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # Run the same smoke check across supported Python versions.
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Display Python info
        run: |
          echo "::group::Environment"
          python -V
          pip -V
          echo "Runner: $RUNNER_OS"
          echo "Ref: $GITHUB_REF"
          echo "SHA: $GITHUB_SHA"
          echo "::endgroup::"

      - name: Run startup smoke test
        id: smoke
        env:
          FYSHARE_CI: "1"
        run: |
          set -euo pipefail

          echo "::group::Start FyShare"
          python FyShare.py > fyshare-startup.log 2>&1 &
          APP_PID="$!"

          STATUS=1
          for attempt in $(seq 1 5); do
            if ! kill -0 "$APP_PID" 2>/dev/null; then
              echo "passed=false" >> "$GITHUB_OUTPUT"
              echo "Startup status: FAILED"
              echo "--- Startup log tail ---"
              tail -n 120 fyshare-startup.log || true
              break
            fi

            if [ "$attempt" -eq 5 ]; then
              echo "passed=true" >> "$GITHUB_OUTPUT"
              echo "Startup status: OK"
              STATUS=0
              break
            fi

            sleep 1
          done
          echo "::endgroup::"

          kill "$APP_PID" 2>/dev/null || true
          wait "$APP_PID" 2>/dev/null || true
          pkill -f FyShare.py 2>/dev/null || true

          exit $STATUS

      - name: Upload startup log artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fyshare-startup-log-${{ matrix.python-version }}
          path: fyshare-startup.log
          if-no-files-found: ignore
          compression-level: 0