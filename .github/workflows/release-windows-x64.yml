name: Release Windows x64

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2022
    if: ${{ github.event.workflow_run.conclusion == 'success' && (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'dev') }}
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          architecture: x64

      - name: Install dependencies
        run: |
          echo "Python: $(python --version)"
          python -m pip install --upgrade pip
          pip install pyinstaller==6.11.1

      - name: Build with PyInstaller
        run: |
          echo "Building..."
          pyinstaller --onefile --distpath ".\bin" --workpath ".\bin\build" --specpath ".\bin" --icon ".\static\images\favicon_256x256.ico" --add-data ".\static;static" --add-data ".\templates;templates" --add-data ".\config.json;." --add-data ".\config_example.json;." FyShare.py
          echo "Output: .\bin"

      - name: Upload artifact (debug)
        uses: actions/upload-artifact@v4
        with:
          name: fyshare-win64
          path: bin/FyShare.exe

      - name: Create release zip
        shell: powershell
        run: |
          Write-Host "Packaging..."
          Compress-Archive -Path ".\bin\FyShare.exe" -DestinationPath ".\bin\fyshare-win64-latest.zip"
          Get-Item ".\bin\fyshare-win64-latest.zip" | Select-Object @{Name="Size(MB)";Expression={[math]::Round($_.Length/1MB, 2)}} | Format-Table -AutoSize

      - name: Create Release
        if: ${{ github.event.workflow_run.head_branch == 'main' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: FyShare Release
          files: bin/fyshare-win64-latest.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}