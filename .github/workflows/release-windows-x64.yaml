name: Release Windows x64

run-name: Release Windows x64 (${{ github.event.workflow_run.head_sha || github.sha }})

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: release-windows-x64
  cancel-in-progress: true

jobs:
  build:
    # Allow manual runs from Actions tab, and auto-publish only for successful CI runs from pushes to main.
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' && github.event.workflow_run.event == 'push') }}

    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout correct commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install PyInstaller
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller==6.11.1

      - name: Log release context
        shell: powershell
        run: |
          Write-Host "::group::Release Context"
          Write-Host "Source workflow run: ${{ github.event.workflow_run.id }}"
          Write-Host "Source SHA: ${{ github.event.workflow_run.head_sha }}"
          Write-Host "Triggered by branch: ${{ github.event.workflow_run.head_branch }}"
          Write-Host "Runner: $env:RUNNER_OS"
          Write-Host "::endgroup::"

      - name: Verify required build files
        shell: powershell
        run: |
          if (-not (Test-Path -Path ".\FyShare.py" -PathType Leaf)) { throw "Missing FyShare.py" }
          if (-not (Test-Path -Path ".\config.json" -PathType Leaf)) { throw "Missing config.json" }
          if (-not (Test-Path -Path ".\config_example.json" -PathType Leaf)) { throw "Missing config_example.json" }
          if (-not (Test-Path -Path ".\static" -PathType Container)) { throw "Missing static directory" }
          if (-not (Test-Path -Path ".\templates" -PathType Container)) { throw "Missing templates directory" }

      - name: Build with PyInstaller
        run: |
          Write-Host "::group::Build"
          pyinstaller `
            --distpath ".\bin" `
            --workpath ".\bin\build" `
            --specpath ".\bin" `
            --icon="..\static\images\fyshare_logo_256x256.ico" `
            --add-data "..\static;static" `
            --add-data "..\templates;templates" `
            --add-data "..\config.json;." `
            --add-data "..\config_example.json;." `
            -y `
            FyShare.py
          Write-Host "::endgroup::"

      - name: Package build output
        shell: powershell
        run: |
          if (-not (Test-Path -Path ".\bin\FyShare\FyShare.exe" -PathType Leaf)) { throw "Missing built binary .\\bin\\FyShare\\FyShare.exe" }
          if (-not (Test-Path -Path ".\README.md" -PathType Leaf)) { throw "Missing README.md" }
          if (-not (Test-Path -Path ".\static\images\fyshare_logo.png" -PathType Leaf)) { throw "Missing static\\images\\fyshare_logo.png" }
          Copy-Item -Path ".\README.md" -Destination ".\bin\FyShare\README.md" -Force
          Copy-Item -Path ".\static\images\fyshare_logo.png" -Destination ".\bin\FyShare\fyshare_logo.png" -Force
          Compress-Archive -Path ".\bin\FyShare\*" -DestinationPath ".\bin\fyshare-win-x64-shared.zip"

      - name: Log packaged artifact details
        shell: powershell
        run: |
          Write-Host "::group::Artifacts"
          Get-ChildItem -Path .\bin | Format-Table Name, Length, LastWriteTime -AutoSize
          Write-Host "::endgroup::"

      - name: Upload artifact snapshot
        uses: actions/upload-artifact@v4
        with:
          name: fyshare-win-x64-shared
          path: bin/fyshare-win-x64-shared.zip
          if-no-files-found: error

      - name: Publish release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: bin/fyshare-win-x64-shared.zip
          fail_on_unmatched_files: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}