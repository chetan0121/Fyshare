name: Release Windows x64

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          architecture: x64

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller==6.11.1

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile `
            --distpath ".\bin" `
            --workpath ".\bin\build" `
            --specpath ".\bin" `
            --icon ".\static\images\fyshare_logo_256x256.ico" `
            --add-data ".\static;static" `
            --add-data ".\templates;templates" `
            --add-data ".\config.json;." `
            --add-data ".\config_example.json;." `
            FyShare.py

      - name: Zip binary
        shell: powershell
        run: |
          Compress-Archive -Path ".\bin\FyShare.exe" -DestinationPath ".\bin\fyshare-win64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fyshare-win64
          path: bin/fyshare-win64.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: FyShare Release
          files: bin/fyshare-win64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}