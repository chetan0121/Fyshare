name: Release Windows x64

run-name: Release Windows x64 (${{ github.event.workflow_run.head_sha || github.sha }})

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: release-windows-x64
  cancel-in-progress: true

jobs:
  build:
    # Allow manual runs from Actions tab, and auto-publish only for successful CI runs from pushes to main.
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' && github.event.workflow_run.event == 'push') }}

    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout correct commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install PyInstaller
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller==6.11.1

      - name: Log release context
        shell: powershell
        run: |
          Write-Host "::group::Release Context"
          Write-Host "Source workflow run: ${{ github.event.workflow_run.id }}"
          Write-Host "Source SHA: ${{ github.event.workflow_run.head_sha }}"
          Write-Host "Triggered by branch: ${{ github.event.workflow_run.head_branch }}"
          Write-Host "Runner: $env:RUNNER_OS"
          Write-Host "::endgroup::"

      - name: Build with PyInstaller
        run: |
          Write-Host "::group::Build"
          pyinstaller `
            --distpath "artifacts/" `
            --workpath "artifacts/build" `
            --clean `
            --noconfirm `
            build-configs/FyShare.spec
          Write-Host "::endgroup::"

      - name: Package build output
        shell: powershell
        run: |
          if (-not (Test-Path -Path ".\artifacts\dist" -PathType Container)) { throw "Missing .\\artifacts\\dist" }
          if (-not (Test-Path -Path ".\artifacts\dist\static" -PathType Container)) { throw "Missing .\\artifacts\\dist\\static" }
          if (-not (Test-Path -Path ".\artifacts\dist\templates" -PathType Container)) { throw "Missing .\\artifacts\\dist\\templates" }
          if (-not (Test-Path -Path ".\artifacts\dist\config.json" -PathType Leaf)) { throw "Missing .\\artifacts\\dist\\config.json" }
          if (-not (Test-Path -Path ".\artifacts\dist\config_example.json" -PathType Leaf)) { throw "Missing .\\artifacts\\dist\\config_example.json" }
          if (-not (Test-Path -Path ".\artifacts\dist\README.md" -PathType Leaf)) { throw "Missing .\\artifacts\\dist\\README.md" }
          if (-not (Test-Path -Path ".\artifacts\dist\LICENSE" -PathType Leaf)) { throw "Missing .\\artifacts\\dist\\LICENSE" }
          Compress-Archive -Path ".\artifacts\dist\*" -DestinationPath ".\artifacts\fyshare-win-x64-shared.zip"
          if (-not (Test-Path -Path ".\artifacts\fyshare-win-x64-shared.zip" -PathType Leaf)) { throw "Missing .\\artifacts\\fyshare-win-x64-shared.zip" }

      - name: Log packaged artifact details
        shell: powershell
        run: |
          Write-Host "::group::Artifacts"
          Get-ChildItem -Path .\artifacts | Format-Table Name, Length, LastWriteTime -AutoSize
          Write-Host "::endgroup::"

      - name: Upload artifact snapshot
        uses: actions/upload-artifact@v4
        with:
          name: fyshare-win-x64-shared
          path: artifacts/fyshare-win-x64-shared.zip
          if-no-files-found: error
          compression-level: 0

      - name: Publish release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: artifacts/fyshare-win-x64-shared.zip
          fail_on_unmatched_files: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}